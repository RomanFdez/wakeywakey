name: WakeyWakey
options:
  bundleIdPrefix: com.sierraespada
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.4"

configs:
  Debug: debug
  Release: release

schemes:
  WakeyWakey:
    build:
      targets:
        WakeyWakey: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    minorVersion: 5.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "S3SQHNG68C"
    CODE_SIGN_STYLE: Automatic

targets:
  WakeyWakey:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WakeyWakey
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sierraespada.wakeywakey
        INFOPLIST_FILE: WakeyWakey/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          FRAMEWORK_SEARCH_PATHS:
            - $(inherited)
            - $(SRCROOT)/../../shared/build/XCFrameworks/debug
        Release:
          FRAMEWORK_SEARCH_PATHS:
            - $(inherited)
            - $(SRCROOT)/../../shared/build/XCFrameworks/release
    dependencies:
      - framework: ../../shared/build/XCFrameworks/debug/Shared.xcframework
        embed: true
        codeSign: true
      - target: WakeyWakeyWidget
        embed: true
      - package: RevenueCat
        product: RevenueCat
    preBuildScripts:
      - name: "[KMP] Build Shared XCFramework"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cd "${SRCROOT}/../.."
          ./gradlew :shared:assembleSharedDebugXCFramework 2>&1 | tail -30
    entitlements:
      path: WakeyWakey/App/WakeyWakey.entitlements
      properties:
        com.apple.developer.usernotifications.time-sensitive: true
        com.apple.security.application-groups:
          - group.com.sierraespada.wakeywakey
    info:
      path: WakeyWakey/App/Info.plist
      properties:
        CFBundleDisplayName: WakeyWakey
        UILaunchScreen: {}
        NSCalendarsFullAccessUsageDescription: "WakeyWakey necesita acceso completo al calendario para mostrarte tus reuniones y enviarte alertas antes de que empiecen."
        NSCalendarsUsageDescription: "WakeyWakey necesita acceso al calendario para mostrarte tus reuniones."
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - fetch
          - remote-notification
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.sierraespada.wakeywakey.refresh

  WakeyWakeyWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: WakeyWakeyWidget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sierraespada.wakeywakey.widget
        INFOPLIST_FILE: WakeyWakeyWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: true
    entitlements:
      path: WakeyWakeyWidget/WakeyWakeyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sierraespada.wakeywakey
    info:
      path: WakeyWakeyWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  NotificationContent:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NotificationContent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sierraespada.wakeywakey.NotificationContent
        INFOPLIST_FILE: NotificationContent/Info.plist
    info:
      path: NotificationContent/Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            UNNotificationExtensionCategory: MEETING_ALERT
            UNNotificationExtensionInitialContentSizeRatio: 1
            UNNotificationExtensionDefaultContentHidden: true
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationViewController
          NSExtensionPointIdentifier: com.apple.usernotifications.content-extension
