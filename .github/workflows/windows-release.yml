name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      release_tag:
        description: 'GitHub Release tag to upload to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    name: Build Windows (MSI + EXE)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      # ── Inyectar credenciales OAuth ────────────────────────────────────────
      - name: Inject OAuth credentials
        shell: pwsh
        env:
          GID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GSECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MSID:    ${{ secrets.MICROSOFT_CLIENT_ID }}
        run: |
          $f = "apps/windows/src/jvmMain/kotlin/com/sierraespada/wakeywakey/windows/BuildConfig.kt"
          $content = Get-Content $f -Raw
          $content = $content -replace 'GOOGLE_CLIENT_ID\s*= ""',     "GOOGLE_CLIENT_ID     = `"$env:GID`""
          $content = $content -replace 'GOOGLE_CLIENT_SECRET\s*= ""', "GOOGLE_CLIENT_SECRET = `"$env:GSECRET`""
          $content = $content -replace 'MICROSOFT_CLIENT_ID\s*= ""',  "MICROSOFT_CLIENT_ID  = `"$env:MSID`""
          Set-Content $f $content
          Write-Host "OAuth credentials injected"

      # ── Build MSI + EXE (forzar re-ejecución) ─────────────────────────────
      - name: Build Windows installers
        shell: pwsh
        run: |
          ./gradlew :apps:windows:packageMsi :apps:windows:packageExe `
            -Prelease `
            -PappVersion=${{ github.event.inputs.version }} `
            --no-daemon `
            --no-configuration-cache `
            --rerun-tasks
          Write-Host "Build complete"

      # ── Debug: mostrar qué se produjo ─────────────────────────────────────
      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== Searching for MSI/EXE files ==="
          Get-ChildItem -Recurse -Path "apps/windows/build" -Include "*.msi","*.exe" -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "=== Done ==="

      # ── Copiar con nombres fijos (sin versión) → URL permanente en web ─────
      # URL en la web: /releases/latest/download/WakeyWakey-Setup.msi
      - name: Prepare artifacts with fixed names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null

          $msi = Get-ChildItem -Recurse -Path "apps/windows/build" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "dist\WakeyWakey-Setup.msi"
            Write-Host "MSI: $($msi.FullName) -> dist\WakeyWakey-Setup.msi ($([math]::Round($msi.Length/1MB,1)) MB)"
          } else {
            Write-Host "##[error]No MSI file found!"
            exit 1
          }

          $exe = Get-ChildItem -Recurse -Path "apps/windows/build" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "dist\WakeyWakey-Setup.exe"
            Write-Host "EXE: $($exe.FullName) -> dist\WakeyWakey-Setup.exe ($([math]::Round($exe.Length/1MB,1)) MB)"
          } else {
            Write-Host "##[warning]No EXE file found (optional)"
          }

      # ── Upload a GitHub Release ────────────────────────────────────────────
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=""
          [ -f "dist/WakeyWakey-Setup.msi" ] && files="$files dist/WakeyWakey-Setup.msi"
          [ -f "dist/WakeyWakey-Setup.exe" ] && files="$files dist/WakeyWakey-Setup.exe"

          if [ -z "$files" ]; then
            echo "No artifacts found!"
            exit 1
          fi

          gh release upload "${{ github.event.inputs.release_tag }}" $files --clobber
          echo "Uploaded: $files"
