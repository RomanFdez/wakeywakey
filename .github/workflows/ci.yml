name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancela runs anteriores si llega otro push

jobs:

  # ─────────────────────────────────────────
  # 1. Lint + Static analysis
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Android Lint
        run: ./gradlew :apps:android:lint

  # ─────────────────────────────────────────
  # 2. Tests unitarios (módulo shared)
  # ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run shared tests
        run: ./gradlew :shared:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/**'
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. Build Android (debug APK)
  # ─────────────────────────────────────────
  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Assemble debug APK
        run: ./gradlew :apps:android:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: apps/android/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────
  # 4. Build Windows (JAR — sin MSI en CI)
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows (JAR)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build Windows JAR
        run: ./gradlew :apps:windows:jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: windows-jar-${{ github.sha }}
          path: apps/windows/build/libs/*.jar
          retention-days: 14
