name: Windows Debug Run

on:
  workflow_dispatch:

jobs:
  debug-run:
    name: Run app on Windows and capture startup log
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build app
        shell: bash
        run: |
          ./gradlew :apps:windows:jvmJar --no-daemon --no-configuration-cache
          echo "Build done"

      - name: Launch app and capture startup log
        shell: bash
        run: |
          echo "=== Launching WakeyWakey ==="

          # Lanza la app en background
          ./gradlew :apps:windows:run --no-daemon --no-configuration-cache \
            > gradle-out.txt 2> gradle-err.txt &
          GRADLE_PID=$!
          echo "Gradle PID: $GRADLE_PID"

          # Convierte la ruta APPDATA de Windows a Unix para bash
          APPDATA_UNIX=$(cygpath "$APPDATA" 2>/dev/null || echo "$APPDATA")
          LOG_PATH="$APPDATA_UNIX/WakeyWakey/startup.log"
          echo "Watching: $LOG_PATH"

          # Espera hasta 120s a que aparezca startup.log (build ya está hecho)
          waited=0
          while [ $waited -lt 120 ] && [ ! -f "$LOG_PATH" ]; do
            sleep 5
            waited=$((waited + 5))
            echo "Waiting for startup.log... ($waited s)"
          done

          echo ""
          echo "=== startup.log ==="
          cat "$LOG_PATH" 2>/dev/null || echo "(not found after ${waited}s)"

          echo ""
          echo "=== gradle stdout ==="
          cat gradle-out.txt || true

          echo ""
          echo "=== gradle stderr ==="
          cat gradle-err.txt || true

          # Mata los procesos
          kill $GRADLE_PID 2>/dev/null || true
          taskkill //F //IM java.exe 2>/dev/null || true

          # Copia artefactos
          mkdir -p debug-logs
          cp "$LOG_PATH" debug-logs/startup.log 2>/dev/null || true
          cp gradle-out.txt debug-logs/ 2>/dev/null || true
          cp gradle-err.txt debug-logs/ 2>/dev/null || true

      - name: Upload debug logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-debug-logs
          path: debug-logs/
