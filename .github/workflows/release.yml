name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # ej. v1.0.0

jobs:

  # ─────────────────────────────────────────
  # 1. Release Android — AAB firmado para Play Store
  # ─────────────────────────────────────────
  release-android:
    name: Release Android (AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      # Reconstruir el keystore desde el secret base64
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/android/release.jks

      - name: Build release AAB
        env:
          KEYSTORE_PATH:      apps/android/release.jks
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :apps:android:bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: apps/android/build/outputs/bundle/release/*.aab

  # ─────────────────────────────────────────
  # 2. Release Windows — MSI + EXE (requiere runner Windows)
  # ─────────────────────────────────────────
  release-windows:
    name: Release Windows (MSI + EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Build Windows installer
        run: ./gradlew :apps:windows:packageMsi :apps:windows:packageExe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.ref_name }}
          path: |
            apps/windows/build/compose/binaries/main/msi/*.msi
            apps/windows/build/compose/binaries/main/exe/*.exe

  # ─────────────────────────────────────────
  # 3. Crear GitHub Release con los artefactos
  # ─────────────────────────────────────────
  create-github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [release-android, release-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
